<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto - CinePlus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { 
        font-family: 'Poppins', sans-serif; 
        background-color: #1a1a1a; 
        color: white; 
    }

    /* Estilo para el contenedor o tarjeta de contacto*/
    .contacto-container {
        background-color: #2a2a2a;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        margin-top: 50px;
    }

    /* Estilo para los campos del formulario*/
    .form-control {
        background-color: #333;
        border: 1px solid #444;
        color: white;
        border-radius: 10px;
    }

    .form-control:focus {
        background-color: #444;
        color: white;
        border-color: #0d6efd;
        box-shadow: none;
    }

    /* Ajuste para etiquetas y textos secundarios*/
    label {
        color: #b0b0b0;
        margin-bottom: 8px;
    }

    .btn-primary {
        border-radius: 10px;
        padding: 10px 25px;
        font-weight: 600;
    }
</style>
</head>
<body>
  <div class="container py-5">
    <h2 class="mb-4">Contáctanos</h2>
    <form id="form-contacto" novalidate>
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="nombre" required>
      </div>
      <div class="mb-3">
        <label for="correo" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="correo" required>
      </div>
      <div class="mb-3">
        <label for="mensaje" class="form-label">Mensaje</label>
        <textarea class="form-control" id="mensaje" rows="4" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Enviar</button>
      <div id="alerta" class="alert alert-success mt-3 d-none">Mensaje enviado con éxito.</div>
    </form>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script>
    $('#form-contacto').on('submit', function (e) {
      e.preventDefault();
      if (this.checkValidity()) {
        $('#alerta').removeClass('d-none').hide().fadeIn();
        setTimeout(() => $('#alerta').fadeOut(), 3000);
        this.reset();
      }
    });
  </script>
</body>
</html>
