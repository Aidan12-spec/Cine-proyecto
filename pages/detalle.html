<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Película - CinePlus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #1a1a1a; color: white; }
        .contenedor-detalle { margin-top: 50px; background: #2a2a2a; padding: 30px; border-radius: 20px; }
        .img-detalle { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <div class="contenedor-detalle shadow-lg">
            <div class="row" id="contenido-detalle">
                </div>
            <div class="text-center mt-4">
                <a href="../index.html" class="btn btn-outline-light">Volver a Cartelera</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script>
        $(document).ready(function() {

            // Obtener el ID de la película desde la URL (?id=1)
            const urlParams = new URLSearchParams(window.location.search);
            const peliId = urlParams.get('id');

            $.getJSON("../data/peliculas.json", function(data) {
              
                // Buscar la película que coincida con el ID
                const peli = data.find(p => p.id == peliId);

                if (peli) {
                    $("#contenido-detalle").html(`
                        <div class="col-md-5">
                            <img src="../img/${peli.imagen}" class="img-fluid img-detalle" alt="${peli.titulo}">
                        </div>
                        <div class="col-md-7">
                            <h1 class="display-4 fw-bold text-primary">${peli.titulo}</h1>
                            <p class="lead text-muted">${peli.generos.join(" | ")}</p>
                            <hr class="bg-light">
                            <h4>Sinopsis</h4>
                            <p>${peli.sinopsis}</p>
                            <div class="mt-4">
                                <h5>Tráiler Oficial</h5>
                                <div class="ratio ratio-16x9">
                                    <iframe src="${peli.trailer}" allowfullscreen></iframe>
                                </div>
                            </div>
                        </div>
                    `);
                } else {
                    $("#contenido-detalle").html("<h2 class='text-center'>Película no encontrada</h2>");
                }
            });
        });
    </script>
</body>
</html>
