<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePlus</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
    body { 
        font-family: 'Poppins', sans-serif; 
        background-color: #1a1a1a; 
        color: white; 
    }
    #form-renta, .modal-content {
        background-color: #2a2a2a;
        padding: 20px;
        border-radius: 15px;
        color: white;
    }
    .form-control, .form-select {
        background-color: #333;
        border: 1px solid #444;
        color: white;
    }
    .form-control:focus, .form-select:focus {
        background-color: #444;
        color: white;
    }
</style>
</head>
<body>
    <div class="container py-5">
        <h2>Renta de Películas</h2>
        <form id="form-renta">
            <div class="mb-3">
                <label class="form-label">Cliente</label>
                <input type="text" id="cliente" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Selecciona Películas (puedes elegir varias)</label>
                <select id="peliculas-renta" class="form-select" multiple required>
                    </select>
                <small class="text-muted">Mantén presionada la tecla Ctrl (o Cmd) para elegir más de una.</small>
            </div>
            <div class="mb-3">
                <label class="form-label">Días de renta</label>
                <input type="number" id="dias" class="form-control" min="1" value="1" required>
            </div>
            <button type="submit" class="btn btn-success">Calcular y Rentar</button>
        </form>
    </div>

    <div class="modal fade" id="modalResumen" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5>Resumen de Compra</h5></div>
                <div id="detalle-resumen" class="modal-body"></div>
                <div class="modal-footer"><button class="btn btn-primary" data-bs-dismiss="modal">Cerrar</button></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
$(document).ready(function() {

    // Carga de las películas en el menú desplegable
    $.getJSON("../data/peliculas.json", function(data) {
        let opciones = "";
        data.forEach(p => {
            opciones += `<option value="${p.precios.normal}">${p.titulo} ($${p.precios.normal})</option>`;
        });
        $("#peliculas-renta").html(opciones);
    }).fail(function() {
        alert("Error: No se pudo cargar el archivo de datos desde la carpeta pages.");
    });

    // Lógica del formulario de renta (Punto 6)
    $('#form-renta').submit(function(e) {
        e.preventDefault();
        let cliente = $('#cliente').val();
        let dias = parseInt($('#dias').val());
        let totalBase = 0;
        
        // Suma de los precios de lo que el usuario seleccionó
        $('#peliculas-renta option:selected').each(function() {
            totalBase += parseFloat($(this).val());
        });

        let totalFinal = totalBase * dias;

        // Mostrar el resultado en el Modal
        $('#detalle-resumen').html(`
            <p><strong>Cliente:</strong> ${cliente}</p>
            <p><strong>Películas:</strong> ${$('#peliculas-renta option:selected').length}</p>
            <p><strong>Días:</strong> ${dias}</p>
            <hr>
            <h4 class="text-primary">Total: $${totalFinal.toFixed(2)}</h4>
        `);
        
        var modalRenta = new bootstrap.Modal(document.getElementById('modalResumen'));
        modalRenta.show();
    });
});
</script>
</body>
</html>
